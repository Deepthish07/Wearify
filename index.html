<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA | Site Bootstrap</title>
    <style>
      :root {
        --charcoal: #1a1a1a;
        --bone: #f5f5f7;
        --champagne: #c5a059;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: var(--bone);
        color: var(--charcoal);
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      main {
        width: min(680px, 100%);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(10px);
        padding: 2rem;
        text-align: center;
        box-shadow: 0 18px 40px -30px rgba(26, 26, 26, 0.55);
      }
      h1 {
        margin: 0 0 0.75rem;
        letter-spacing: 0.2em;
        font-family: 'Times New Roman', serif;
      }
      p { line-height: 1.65; color: rgba(26, 26, 26, 0.76); }
      .cta {
        display: inline-block;
        margin-top: 1rem;
        background: var(--champagne);
        color: var(--charcoal);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 12px;
        padding: 0.85rem 1.2rem;
        border-radius: 9999px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AURA</h1>
      <p>
        GitHub Pages bootstrap page is active. If your static export is deploying via Actions,
        refresh in a moment and the full storefront will load here automatically.
      </p>
      <a class="cta" href="./">Reload Storefront</a>
    </main>
  </body>
</html>
