<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA | Redirecting</title>
    <script>
      // Redirect unknown paths back to repository root so GitHub Pages doesn't strand users on 404.
      var path = window.location.pathname;
      var parts = path.split('/').filter(Boolean);
      var repoRoot = parts.length > 0 ? '/' + parts[0] + '/' : '/';
      window.location.replace(repoRoot);
    </script>
  </head>
  <body></body>
</html>
